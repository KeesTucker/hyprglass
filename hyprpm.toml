[repository]
name = "HyprGlass"
authors = ["Hyprnux"]
description = "Apple-style Liquid Glass effect for Hyprland"

# No commit pins on this fork: with no matching pin, hyprpm falls back to
# building the default branch (main) HEAD, which is exactly what we want -
# main here IS the patched code, targeting the currently-installed Hyprland
# (0.55.4). Upstream's pins would have reset the build to upstream's own
# (broken-for-windows) release commits, bypassing every fix in this fork.
commit_pins = []

[hyprglass]
description = "Liquid Glass window decoration effect"
output = "hyprglass.so"
build = ["make"]
