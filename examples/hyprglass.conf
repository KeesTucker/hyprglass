# HyprGlass - Liquid Glass effect (github.com/KeesTucker/hyprglass)
# Loaded via hyprpm (see autostart.conf: exec-once = hyprpm reload -n)
# Full option reference: https://github.com/KeesTucker/hyprglass#configuration
#
# Every value below is set to its current hardcoded default (see
# src/BuiltInPresets.hpp in the plugin repo) so you can see and tweak them all
# in one place - delete a line to fall back to the built-in default again.
plugin:hyprglass {
    enabled = 1
    default_theme = dark
    default_preset = default

    # Overridable settings (global tier - applies to both themes unless a
    # dark:/light: override below or the active preset takes precedence)
    blur_strength = 0.4          # no background blur - just the refraction/tint effect
    blur_iterations = 3
    refraction_strength = 1.2
    chromatic_aberration = 0.2
    fresnel_strength = 0.8
    specular_strength = 0.8
    glass_opacity = 1
    edge_thickness = 0.03
    tint_color = 0x8899aa22
    lens_distortion = 0.5

    # Focus-reactive windows: edge_thickness/refraction_strength above are
    # the focused-window look; these scale them down as a window loses
    # focus (1.0 = no change). Eased over ~120ms, not an instant pop.
    unfocused_edge_thickness_scale = 0.6
    unfocused_refraction_scale = 0.65

    # On focus, thins the window's own opaque content right at the
    # refraction band (0 = disabled, 1 = fully transparent at the very
    # edge) so glass shows through more strongly there, fading back to
    # fully opaque toward the interior. Same band as the refraction bezel.
    focus_edge_opacity_fade = 0.6

    # Per-theme tone mapping (hardcoded fallback if unset)
    dark:brightness = 0.8
    dark:contrast = 0.9
    dark:saturation = 0.8
    dark:vibrancy = 0.15
    dark:vibrancy_darkness = 0
    dark:adaptive_dim = 0.1
    dark:adaptive_boost = 0.0

    light:brightness = 1.12
    light:contrast = 0.92
    light:saturation = 0.85
    light:vibrancy = 0.12
    light:vibrancy_darkness = 0.0
    light:adaptive_dim = 0.0
    light:adaptive_boost = 0.1

    layers {
        # Empty namespaces whitelist = apply to every layer surface (bars, docks, widgets)
        enabled = 1

        # Gradient finite-difference step (JFA field texels, roughly real px)
        # used to derive refraction direction. Wider blends the seam where
        # two separate silhouette lobes (e.g. adjacent bar pill modules)
        # meet into a gradual transition instead of a hard crease, at the
        # cost of a little directional sharpness at real concave corners.
        # Was cranked to 200 compensating for the unsigned-field corner
        # seams; since the field is signed (2026-07-21) the default works.
        refraction_blend = 14

        # Cap on the JFA distance field's longer side, in texels. Higher
        # gives crisper edges/refraction on large layers at more GPU cost
        # per frame. Values above 2048 are silently clamped to the
        # plugin's JFA_HARD_MAX_DIM safety ceiling, so 4096 was a lie.
        distance_field_resolution = 1024
    }
}
